$kind: http-request
url: "{{baseUrl}}/jadwal"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "asal_keberangkatan": "Bandung",
      "tujuan_keberangkatan": "Surabaya",
      "tanggal_berangkat": "2026-06-10T08:00:00.000Z",
      "tanggal_kedatangan": "2026-06-10T16:00:00.000Z",
      "harga": 350000,
      "keretaId": {{keretaId}}
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Request succeeded", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      const data = pm.response.json();
      if (data && data.id !== undefined) pm.collectionVariables.set('jadwalId', String(data.id));
    language: text/javascript
order: 1000
