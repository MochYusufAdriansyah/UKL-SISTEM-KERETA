$kind: http-request
url: "{{baseUrl}}/jadwal/{{jadwalId}}"
method: PATCH
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "asal_keberangkatan": "Bandung",
      "tujuan_keberangkatan": "Yogyakarta",
      "tanggal_berangkat": "2026-06-10T09:00:00.000Z",
      "tanggal_kedatangan": "2026-06-10T15:00:00.000Z",
      "harga": 325000,
      "keretaId": {{keretaId}}
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
order: 4000
