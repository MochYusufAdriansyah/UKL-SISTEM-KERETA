$kind: http-request
url: "{{baseUrl}}/kursi"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "no_kursi": "A2",
      "gerbongId": {{gerbongId}}
    }
auth:
  type: bearer
  credentials:
    token: "{{adminToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Request succeeded", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 201]);
      });
      const data = pm.response.json();
      if (data && data.id !== undefined) pm.collectionVariables.set('kursiId2', String(data.id));
    language: text/javascript
order: 2000
