$kind: http-request
description: Requires an existing admin account. Public registration does not
  create admin users.
url: "{{baseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "username": "{{adminUsername}}",
      "password": "{{adminPassword}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Login succeeded", function () {
        pm.response.to.have.status(200);
      });
      const data = pm.response.json();
      if (data && data.token) pm.collectionVariables.set('adminToken', data.token);
      if (data && data.user && data.user.id !== undefined) pm.collectionVariables.set('adminUserId', String(data.user.id));
    language: text/javascript
order: 4000
